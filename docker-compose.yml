services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-server-aem
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "AEM API"
      APP_ENV: local
      APP_KEY: ${APP_KEY:-base64:wAAadZnMxFFhLi2IoOV90ZrkwOkv2tj0R/bYBdvd5P0=}
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      LOG_CHANNEL: stack
      DB_CONNECTION: pgsql
      DB_HOST: db-postgres
      DB_PORT: 5432
      DB_DATABASE: aem_backend
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      JWT_SECRET: ${JWT_SECRET:-aem-local-jwt-secret-change-me-2026}
    depends_on:
      db-postgres:
        condition: service_healthy
    command: >
      sh -c "php artisan config:clear
      && php artisan migrate --force
      && php artisan serve --host=0.0.0.0 --port=8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aem-network

  db-postgres:
    image: postgres:15-alpine
    container_name: db-postgres-aem
    restart: unless-stopped
    environment:
      POSTGRES_DB: aem_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - db-data-aem:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aem_backend"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aem-network

networks:
  aem-network:
    driver: bridge

volumes:
  db-data-aem:
    driver: local
